stages:
  - lint
  - test
  - build

variables:
  GOPATH: $CI_PROJECT_DIR/.go
  GOMODCACHE: $CI_PROJECT_DIR/.go/pkg/mod
  GOLANGCI_LINT_CACHE: $CI_PROJECT_DIR/.cache/golangci-lint
  STORAGE_DRIVER: vfs
  BUILDAH_FORMAT: docker
  IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .go/pkg/mod
    - .cache/golangci-lint

# 1. Lint Stage (use Go 1.24 image so linter matches project toolchain; golangci-lint image uses older Go and fails on 1.24 export data)
lint:
  stage: lint
  image: golang:1.24-alpine
  before_script:
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64
    - export PATH="${GOPATH}/bin:${PATH}"
    - go mod download
    - go build -o /dev/null ./...
  script:
    - golangci-lint run ./... --timeout 5m

# 2. Test Stage (use Go 1.24 to match go.mod)
test:
  stage: test
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev
    - go mod download
  script:
    - go test -v -race ./...

# 3. Build Stages (IMAGE_NAME fallback when CI_REGISTRY_IMAGE is unset, e.g. registry disabled)
build:
  stage: build
  image: quay.io/buildah/stable:v1.35
  variables:
    REGISTRY_AUTH_FILE: /tmp/auth.json
  before_script:
    - buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - export IMAGE_NAME="${CI_REGISTRY_IMAGE:-email-service}:${CI_COMMIT_REF_SLUG}"
    - buildah bud -t $IMAGE_NAME .
    - |
      if [ -n "$CI_REGISTRY_IMAGE" ]; then
        buildah push $IMAGE_NAME
      else
        echo "CI_REGISTRY_IMAGE not set; skipping push (enable Container Registry in project settings to push)"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "1-cicd-pipeline"
    - if: $CI_COMMIT_TAG